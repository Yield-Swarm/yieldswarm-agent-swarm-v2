[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.26"

[features]
resolution = true
skip-lint = false

[programs.localnet]
cross_chain = "CrossChn1111111111111111111111111111111111"
swarm_ops = "SwarmOps111111111111111111111111111111111"
shard_coordinator = "ShardCrd111111111111111111111111111111111"

[programs.devnet]
cross_chain = "CrossChn1111111111111111111111111111111111"
swarm_ops = "SwarmOps111111111111111111111111111111111"
shard_coordinator = "ShardCrd111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[workspace]
members = [
    "programs/*",
]
