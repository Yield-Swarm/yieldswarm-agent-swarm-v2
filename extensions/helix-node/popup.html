<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Helix Nodes</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 12px; width: 280px; background: #06080f; color: #e8edf5; }
    h1 { font-size: 1rem; margin: 0 0 8px; color: #3dffa8; }
    .muted { color: #8b9cb8; font-size: 0.8rem; }
    .stat { display: flex; justify-content: space-between; margin: 6px 0; }
    button { width: 100%; margin-top: 8px; padding: 8px; border: 1px solid #3dffa8; background: transparent; color: #3dffa8; border-radius: 6px; cursor: pointer; }
    .status-online { color: #3dffa8; }
    .status-offline { color: #ffb347; }
  </style>
</head>
<body>
  <h1>Helix Nodes</h1>
  <p class="muted">Lightweight YieldSwarm node — earn lottery tickets in the background.</p>
  <div class="stat"><span>Status</span><span id="status" class="status-offline">…</span></div>
  <div class="stat"><span>Lottery tickets</span><strong id="tickets">0</strong></div>
  <div class="stat"><span>Points</span><strong id="points">0</strong></div>
  <div class="stat"><span>Referral code</span><code id="referral">—</code></div>
  <button id="share">Share (+2 tickets)</button>
  <button id="sync">Sync now</button>
  <p class="muted" style="margin-top:10px">Honest disclosure: this node runs lightweight network health tasks only. No bandwidth resale.</p>
  <script src="popup.js"></script>
</body>
</html>
