<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kairo — Data Contribution Dashboard</title>
  <style>
    :root { --bg: #0a0f1a; --panel: #121a2b; --accent: #3dd68c; --text: #e8edf5; --muted: #8b9cb8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 1.5rem 2rem; border-bottom: 1px solid #1e2a42; }
    h1 { font-size: 1.4rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }
    main { padding: 2rem; max-width: 960px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: var(--panel); border-radius: 12px; padding: 1.25rem; }
    .stat .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat .value { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin-top: 0.25rem; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 12px; overflow: hidden; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #1e2a42; }
    th { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
    .empty { color: var(--muted); text-align: center; padding: 2rem; }
    button { background: var(--accent); color: #0a0f1a; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .toolbar { margin-bottom: 1rem; display: flex; gap: 0.75rem; align-items: center; }
    #status { color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>Kairo Driver Contribution</h1>
    <p class="sub">Signed telemetry → Mandelbrot / Tree of Life → YieldSwarm rewards</p>
  </header>
  <main>
    <div class="toolbar">
      <button id="refresh">Refresh</button>
      <span id="status">Loading…</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="label">Active Drivers</div><div class="value" id="driver-count">—</div></div>
      <div class="stat"><div class="label">Potential Rewards</div><div class="value" id="total-reward">—</div></div>
      <div class="stat"><div class="label">YieldSwarm Shard</div><div class="value">120</div></div>
      <div class="stat"><div class="label">Agents / Shard</div><div class="value">84</div></div>
    </div>
    <table>
      <thead><tr><th>Driver</th><th>Batches</th><th>Potential Reward (USD)</th></tr></thead>
      <tbody id="drivers"><tr><td colspan="3" class="empty">No data yet</td></tr></tbody>
    </table>
  </main>
  <script>
    const API = window.KAIRO_API_URL || 'http://localhost:8092';
    async function load() {
      const status = document.getElementById('status');
      try {
        const res = await fetch(`${API}/dashboard/summary`);
        const data = await res.json();
        document.getElementById('driver-count').textContent = data.driver_count;
        document.getElementById('total-reward').textContent = `$${data.total_potential_reward_usd.toFixed(4)}`;
        const tbody = document.getElementById('drivers');
        if (!data.drivers.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="empty">No contributions yet — register a driver via POST /drivers/register</td></tr>';
        } else {
          tbody.innerHTML = data.drivers.map(d =>
            `<tr><td><code>${d.driver_id.slice(0,12)}…</code></td><td>${d.batches}</td><td>$${d.reward_usd.toFixed(4)}</td></tr>`
          ).join('');
        }
        status.textContent = `Updated ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        status.textContent = `API unreachable (${API})`;
      }
    }
    document.getElementById('refresh').addEventListener('click', load);
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
