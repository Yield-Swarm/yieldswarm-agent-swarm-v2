name: CI

on:
  push:
    branches: [main, development, cursor/**]
  pull_request:
    branches: [main, development]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install -r requirements.txt eth-account
      - name: Python tests
        run: python3 tests/test_smoke_integration.py
      - name: Backend tests
        run: cd backend && npm ci && npm test
      - name: Frontend tests
        run: cd frontend && npm ci && npm test
      - name: Secrets audit
        run: bash scripts/secrets-audit.sh
