# YieldSwarm local full-stack compose — env-driven plug-and-play
# Usage: cp config/layered.env.example .env && docker compose -f deploy/docker-compose.stack.yml up -d
services:
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - ../.env
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  litellm:
    image: ${YIELDSWARM_LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-latest}
    ports:
      - "${LLM_ROUTER_PORT:-4000}:4000"
    volumes:
      - ./templates/llm-router/litellm.config.yaml.tpl:/app/config.yaml:ro
    env_file:
      - ../.env
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
