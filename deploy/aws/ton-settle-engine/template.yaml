AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: YieldSwarm TON Settle Engine — Multi-AZ Lambda + ElastiCache Redis (us-west-2)

Parameters:
  EnvironmentName:
    Type: String
    Default: production
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  PrivateSubnetACidr:
    Type: String
    Default: 10.42.10.0/24
  PrivateSubnetBCidr:
    Type: String
    Default: 10.42.20.0/24
  PublicSubnetACidr:
    Type: String
    Default: 10.42.1.0/24
  PublicSubnetBCidr:
    Type: String
    Default: 10.42.2.0/24
  CorsOrigin:
    Type: String
    Default: https://yieldswarm.crypto
  TonRpcUrl:
    Type: String
    Default: https://toncenter.com/api/v2/jsonRPC
  RateLimitMaxTokens:
    Type: Number
    Default: 5
  RedisNodeType:
    Type: String
    Default: cache.t4g.micro

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Architectures: [arm64]
    Tracing: Active

Resources:
  SettleVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub yieldswarm-settle-${EnvironmentName}

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SettleVpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnetACidr
      Tags: [{ Key: Name, Value: !Sub yieldswarm-private-a-${EnvironmentName} }]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SettleVpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnetBCidr
      Tags: [{ Key: Name, Value: !Sub yieldswarm-private-b-${EnvironmentName} }]

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SettleVpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetACidr
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub yieldswarm-public-a-${EnvironmentName} }]

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SettleVpc
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnetBCidr
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: !Sub yieldswarm-public-b-${EnvironmentName} }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcIgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SettleVpc
      InternetGatewayId: !Ref InternetGateway

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcIgwAttach
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SettleVpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcIgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SettleVpc

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda settle engine
      VpcId: !Ref SettleVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ElastiCache Redis — Lambda ingress only
      VpcId: !Ref SettleVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Multi-AZ Redis for token bucket
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: YieldSwarm atomic rate limiter
      Engine: redis
      EngineVersion: '7.1'
      CacheNodeType: !Ref RedisNodeType
      NumCacheClusters: 2
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: false

  SignerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub yieldswarm/${EnvironmentName}/ton-ed25519-signer
      Description: Ed25519 seed for TON cell signing (32-byte hex in SERVER_ED25519_PRIVATE_KEY)
      SecretString: '{"SERVER_ED25519_PRIVATE_KEY":"REPLACE_WITH_64_HEX_CHARS"}'

  SettleHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref EnvironmentName
      CorsConfiguration:
        AllowOrigins: [!Ref CorsOrigin]
        AllowMethods: [POST, OPTIONS]
        AllowHeaders: [Content-Type, Authorization]

  SettleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub yieldswarm-ton-settle-${EnvironmentName}
      CodeUri: .
      Handler: handler.handler
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
      Environment:
        Variables:
          REDIS_HOST: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
          REDIS_PORT: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
          SECRETS_ARN: !Ref SignerSecret
          CORS_ORIGIN: !Ref CorsOrigin
          TON_RPC_URL: !Ref TonRpcUrl
          RATE_LIMIT_MAX_TOKENS: !Ref RateLimitMaxTokens
          RATE_LIMIT_REFILL_PER_SEC: '0.0166'
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref SignerSecret
      Events:
        AllocateApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref SettleHttpApi
            Path: /v1/compute/allocate
            Method: POST

  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub yieldswarm-settle-5xx-${EnvironmentName}
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiId
          Value: !Ref SettleHttpApi
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub yieldswarm-settle-throttles-${EnvironmentName}
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref SettleFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold

Outputs:
  HttpApiUrl:
    Description: API Gateway endpoint for Vercel TMA frontend
    Value: !Sub https://${SettleHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}
  AllocateEndpoint:
    Value: !Sub https://${SettleHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/v1/compute/allocate
  RedisPrimaryEndpoint:
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
  SignerSecretArn:
    Value: !Ref SignerSecret
