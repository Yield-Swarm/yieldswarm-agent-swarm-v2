AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hardened serverless TON MMORPG settle engine — Multi-AZ Lambda + ElastiCache Serverless Redis

Parameters:
  EnvironmentName:
    Type: String
    Default: production
  CorsOrigin:
    Type: String
    Default: https://yieldswarm.crypto
  TonRpcUrl:
    Type: String
    Default: https://toncenter.com/api/v2/jsonRPC
  PlayerSbtContract:
    Type: String
    Default: ''
    Description: PlayerSBT contract address for getCharacterState attestation
  RateLimitMaxTokens:
    Type: Number
    Default: 5

Globals:
  Function:
    Runtime: nodejs20.x
    Tracing: Active

Resources:
  GameVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ton-mmorpg-${EnvironmentName}-vpc

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref GameVpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{ Key: Name, Value: !Sub ton-mmorpg-private-a-${EnvironmentName} }]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref GameVpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: [{ Key: Name, Value: !Sub ton-mmorpg-private-b-${EnvironmentName} }]

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref GameVpc
      CidrBlock: 10.0.101.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcIgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref GameVpc
      InternetGatewayId: !Ref InternetGateway

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcIgwAttach
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnetA

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref GameVpc

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcIgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref GameVpc

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Outbound isolation for PoE settle engine
      VpcId: !Ref GameVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Ingress limit to authorized Lambda runtime
      VpcId: !Ref GameVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Interface endpoints for Lambda (Secrets Manager)
      VpcId: !Ref GameVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcId: !Ref GameVpc
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  ProductionRedisBucket:
    Type: AWS::ElastiCache::ServerlessCache
    Properties:
      Engine: redis
      ServerlessCacheName: !Sub ton-game-rate-limiter-${EnvironmentName}
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref RedisSecurityGroup

  GameEngineSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ton-mmorpg-${EnvironmentName}-signer
      Description: Ed25519 private seed for signing TVM transaction blocks
      SecretString: '{"SERVER_ED25519_PRIVATE_KEY":"REPLACE_WITH_64_HEX_CHARS"}'

  SettleHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub ton-mmorpg-${EnvironmentName}-backend
      StageName: !Ref EnvironmentName
      CorsConfiguration:
        AllowOrigins: [!Ref CorsOrigin]
        AllowMethods: [POST, OPTIONS]
        AllowHeaders: [Content-Type, Authorization]

  AuthoritativePoEFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub AuthoritativePoE-${EnvironmentName}
      CodeUri: ../../src/backend-lambda/
      Handler: handler.claimReward
      MemorySize: 1792
      Timeout: 10
      Architectures: [arm64]
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
        SubnetIds: [!Ref PrivateSubnetA, !Ref PrivateSubnetB]
      Environment:
        Variables:
          REDIS_HOST: !GetAtt ProductionRedisBucket.Endpoint.Address
          REDIS_PORT: !GetAtt ProductionRedisBucket.Endpoint.Port
          SECRETS_ARN: !Ref GameEngineSecret
          TON_RPC_URL: !Ref TonRpcUrl
          PLAYER_SBT_CONTRACT: !Ref PlayerSbtContract
          CORS_ORIGIN: !Ref CorsOrigin
          RATE_LIMIT_MAX_TOKENS: !Ref RateLimitMaxTokens
          RATE_LIMIT_REFILL_PER_SEC: '0.0166'
          CHAIN_DELTA_TOLERANCE_SEC: '120'
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - SecretsManagerReadPolicy:
            SecretArn: !Ref GameEngineSecret
      Events:
        ClaimApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref SettleHttpApi
            Path: /api/claim
            Method: POST
        AllocateApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref SettleHttpApi
            Path: /v1/compute/allocate
            Method: POST

  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ton-mmorpg-5xx-${EnvironmentName}
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiId
          Value: !Ref SettleHttpApi
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ton-mmorpg-lambda-errors-${EnvironmentName}
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AuthoritativePoEFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold

Outputs:
  HttpApiUrl:
    Value: !Sub https://${SettleHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}
  ClaimEndpoint:
    Value: !Sub https://${SettleHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/api/claim
  AllocateEndpoint:
    Value: !Sub https://${SettleHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/v1/compute/allocate
  LambdaFunctionName:
    Value: !Ref AuthoritativePoEFunction
  HttpApiName:
    Value: !Sub ton-mmorpg-${EnvironmentName}-backend
  RedisEndpoint:
    Value: !GetAtt ProductionRedisBucket.Endpoint.Address
  SignerSecretArn:
    Value: !Ref GameEngineSecret
