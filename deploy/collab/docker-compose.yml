# Collaborative workspace — code-server + optional Jitsi Meet
# Usage:
#   cp .env.collab.example .env.collab && edit passwords
#   docker compose up -d                    # code-server only
#   docker compose --profile jitsi up -d    # + Jitsi

services:
  code-server:
    image: codercom/code-server:4.96.2
    container_name: yieldswarm-code-server
    restart: unless-stopped
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD:?set CODE_SERVER_PASSWORD in .env.collab}
    volumes:
      - ${CODE_SERVER_WORKSPACE:-/workspace/yieldswarm-agent-swarm-v2}:/home/coder/project
      - code-server-config:/home/coder/.config
    command:
      - --auth
      - password
      - --bind-addr
      - ${CODE_SERVER_BIND:-127.0.0.1}:${CODE_SERVER_PORT:-8080}
      - /home/coder/project
    ports:
      - "${CODE_SERVER_BIND:-127.0.0.1}:${CODE_SERVER_PORT:-8080}:${CODE_SERVER_PORT:-8080}"
    networks:
      - collab

  jitsi-web:
    profiles: [jitsi]
    image: jitsi/web:stable-9646
    container_name: yieldswarm-jitsi-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${JITSI_HTTP_PORT:-8081}:80"
      - "127.0.0.1:${JITSI_HTTPS_PORT:-8443}:443"
    environment:
      - ENABLE_AUTH=${JITSI_ENABLE_AUTH:-1}
      - ENABLE_GUESTS=${JITSI_ENABLE_GUESTS:-0}
      - PUBLIC_URL=${PUBLIC_URL:-https://localhost:8443}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
      - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
      - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
    depends_on:
      - jitsi-prosody
      - jitsi-jicofo
      - jitsi-jvb
    networks:
      - collab

  jitsi-prosody:
    profiles: [jitsi]
    image: jitsi/prosody:stable-9646
    container_name: yieldswarm-jitsi-prosody
    restart: unless-stopped
    environment:
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
      - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
      - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
    networks:
      - collab

  jitsi-jicofo:
    profiles: [jitsi]
    image: jitsi/jicofo:stable-9646
    container_name: yieldswarm-jitsi-jicofo
    restart: unless-stopped
    environment:
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
    depends_on:
      - jitsi-prosody
    networks:
      - collab

  jitsi-jvb:
    profiles: [jitsi]
    image: jitsi/jvb:stable-9646
    container_name: yieldswarm-jitsi-jvb
    restart: unless-stopped
    environment:
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
    depends_on:
      - jitsi-prosody
    networks:
      - collab

volumes:
  code-server-config:

networks:
  collab:
    driver: bridge
