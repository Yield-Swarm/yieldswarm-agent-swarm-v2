version: "2.0"

services:
  vault-agent:
    image: hashicorp/vault:1.18
    command: agent -config=/etc/vault-agent/vault-agent.hcl
    env:
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_WRAPPED_SECRET_ID=${VAULT_WRAPPED_SECRET_ID}
    expose:
      - port: 8100
        to:
          - service: worker
    params:
      storage:
        vault-secrets:
          mount: /run/secrets

  worker:
    image: ghcr.io/yieldswarm/swarm-worker:stable
    depends_on:
      - vault-agent
    env:
      - NODE_ENV=production
      - WORKER_ENV=production
      - WORKER_PORT=8080
      - HEALTHCHECK_PATH=/healthz
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_AGENT_ADDR=http://vault-agent:8100
      - AGENT_ENV_FILE=/run/secrets/agent.env
    expose:
      - port: 8080
        as: 80
        to:
          - global: true
    readiness_probe:
      http_get:
        path: /healthz
        port: 8080
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    liveness_probe:
      http_get:
        path: /healthz
        port: 8080
      initial_delay_seconds: 60
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    params:
      storage:
        worker-state:
          mount: /var/lib/yieldswarm
        model-cache:
          mount: /var/cache/yieldswarm
        worker-logs:
          mount: /var/log/yieldswarm
        vault-secrets:
          mount: /run/secrets

profiles:
  compute:
    worker:
      resources:
        cpu:
          units: "8.0"
        memory:
          size: 32Gi
        gpu:
          units: "1"
          attributes:
            vendor:
              nvidia
            model:
              - rtx3090
        storage:
          - name: worker-state
            size: 200Gi
            attributes:
              persistent: "true"
              class: beta3
          - name: model-cache
            size: 500Gi
            attributes:
              persistent: "true"
              class: beta3
          - name: worker-logs
            size: 50Gi
            attributes:
              persistent: "true"
              class: beta3
  placement:
    rtx3090-production:
      attributes:
        host: akash
        gpu.nvidia.model: rtx3090
        purpose: production
      pricing:
        worker:
          denom: uakt
          amount: "700000"

deployment:
  worker:
    rtx3090-production:
      profile: worker
      count: 3
