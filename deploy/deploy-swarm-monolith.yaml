version: "2.0"

services:
  worker:
    # Vault-hardened worker image; secrets rendered at runtime via Vault Agent.
    image: ghcr.io/yield-swarm/yieldswarm-agent:1.0.0
    env:
      - NODE_ENV=production
      - WORKER_ENV=production
      - WORKER_PORT=8080
      - HEALTHCHECK_PATH=/healthz
      # Vault bootstrap (injected at `deployment create` via --env flags)
      - VAULT_ADDR=https://vault.yieldswarm.io:8200
      - VAULT_ROLE_ID
      - VAULT_WRAPPED_SECRET_ID
      - AGENT_SHARD_ID
      - VAULT_AGENT_CONFIG=/etc/vault-agent/vault-agent.hcl
      - AGENT_ENV_FILE=/run/secrets/agent.env
    expose:
      - port: 8080
        as: 80
        to:
          - global: true
    readiness_probe:
      http_get:
        path: /healthz
        port: 8080
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    liveness_probe:
      http_get:
        path: /healthz
        port: 8080
      initial_delay_seconds: 45
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    params:
      storage:
        secrets:
          mount: /run/secrets
          readOnly: false
        worker-state:
          mount: /var/lib/yieldswarm
        model-cache:
          mount: /var/cache/yieldswarm
        worker-logs:
          mount: /var/log/yieldswarm

profiles:
  compute:
    worker:
      resources:
        cpu:
          units: "8.0"
        memory:
          size: 32Gi
        gpu:
          units: "1"
          attributes:
            vendor:
              nvidia
            model:
              - rtx3090
        storage:
          - name: secrets
            size: 8Mi
            attributes:
              persistent: false
              class: ram
          - name: worker-state
            size: 200Gi
            attributes:
              persistent: "true"
              class: beta3
          - name: model-cache
            size: 500Gi
            attributes:
              persistent: "true"
              class: beta3
          - name: worker-logs
            size: 50Gi
            attributes:
              persistent: "true"
              class: beta3
  placement:
    rtx3090-production:
      attributes:
        host: akash
        gpu.nvidia.model: rtx3090
        purpose: production
      pricing:
        worker:
          denom: uakt
          amount: "700000"

deployment:
  worker:
    rtx3090-production:
      profile: worker
      count: 3
