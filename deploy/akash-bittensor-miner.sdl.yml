---
version: "2.0"

# Akash SDL — Dual-purpose Bittensor worker (RTX 3090 class GPU)
# Port 8080: telemetry → Vercel Arena dashboard
# Port 8091: Bittensor axon for validator challenges
#
# Vault bootstrap env vars (VAULT_ROLE_ID, VAULT_WRAPPED_SECRET_ID) are
# injected at `deployment create` via --env flags from deploy-bittensor.sh.
# The entrypoint unwraps the SecretID once and loads runtime/bittensor via hvac.

services:
  bittensor-miner:
    image: ${DEPLOY_IMAGE}
    expose:
      - port: 8080
        as: 80
        to:
          - global: true
      - port: 8091
        as: 8091
        to:
          - global: true
    env:
      - BT_AXON_PORT=8091
      - OLLAMA_HOST=0.0.0.0:11434
      - TELEMETRY_PORT=8080
      - BT_WALLET_PATH=/run/secrets/bittensor
      # Vault runtime bootstrap (values from deployment create --env)
      - VAULT_ADDR
      - VAULT_ROLE_ID
      - VAULT_WRAPPED_SECRET_ID
      - VAULT_KV_MOUNT=yieldswarm
      - VAULT_SECRET_PATHS=runtime/bittensor,runtime/akash,rpc/bittensor
    params:
      storage:
        secrets:
          mount: /run/secrets
          readOnly: false
        ollama-cache:
          mount: /root/.ollama
          readOnly: false
    count: 1

profiles:
  compute:
    bittensor-miner:
      resources:
        cpu:
          units: 4
        memory:
          size: 32Gi
        storage:
          - name: secrets
            size: 8Mi
            attributes:
              persistent: false
              class: ram
          - name: ollama-cache
            size: 50Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: rtx3090
                - model: rtx4090
  placement:
    akash:
      pricing:
        bittensor-miner:
          denom: uakt
          amount: 8000

deployment:
  bittensor-miner:
    akash:
      profile: bittensor-miner
      count: 1
