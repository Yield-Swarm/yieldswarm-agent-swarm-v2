# YieldSwarm local full-stack compose (devnet).
# Usage: cp deploy/env/layered.env.example .env && docker compose -f deploy/docker-compose.yml up
services:
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      NODE_ENV: development
      TARGET_ENV: ${TARGET_ENV:-devnet}
      GREEK_LAYER__ACCESS_CONTROL_ENABLED: ${GREEK_LAYER__ACCESS_CONTROL_ENABLED:-true}
      GREEK_LAYER__MAX_CONTEXT_WINDOW: ${GREEK_LAYER__MAX_CONTEXT_WINDOW:-32}
      EASTERN_LAYER__FEEDBACK_ENABLED: ${EASTERN_LAYER__FEEDBACK_ENABLED:-true}
      LLM__ROUTER_TYPE: ${LLM__ROUTER_TYPE:-odysseus}
      ZK__VERIFIER_ADDRESS: ${ZK__VERIFIER_ADDRESS:-0x0000000000000000000000000000000000000000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  hardware-guardian:
    image: curlimages/curl:8.5.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache bash bc 2>/dev/null || true
        exec bash /guardian/entrypoint.monitor.sh
    volumes:
      - ./entrypoint.monitor.sh:/guardian/entrypoint.monitor.sh:ro
    environment:
      METRICS_URL: ${METRICS_URL:-http://backend:8080/api/health}
      API_BASE: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring
