---
# Akash SDL v2.0 — YieldSwarm integration backend (Helix + IoTeX treasury routing)
# Serves Arena API, Helix /api/helix/*, sovereign telemetry on :8080.
# Secrets from HashiCorp Vault at boot (treasury/mining_roots + iotex hub).
#
# Deploy:
#   ./scripts/akash-vault-prepare.sh integration-backend
#   ./scripts/deploy-backend-akash.sh
#
# Minimal reference (upload v2.0): deploy/akash-backend.sdl.minimal.yml
version: "2.0"

services:
  backend:
    image: ${DEPLOY_IMAGE:-${BACKEND_IMAGE:-ghcr.io/yieldswarm/yieldswarm-backend:latest}}
    expose:
      - port: 8080
        as: 8080
        to:
          - global: true
    env:
      - PORT=8080
      - HOST=0.0.0.0
      - NODE_ENV=production
      - HELIX_CHAIN_ENABLED=${HELIX_CHAIN_ENABLED:-1}
      - AKASH_OWNER_ADDRESS=${AKASH_OWNER_ADDRESS}
      - AKASH_CONSOLE_API=${AKASH_CONSOLE_API:-https://console-api.akash.network/v1}
      - ODYSSEUS_BRAIN_URL=${ODYSSEUS_BRAIN_URL:-}
      - HEALTH_PATH=/api/health
      # Vault AppRole (issue via scripts/akash-vault-prepare.sh)
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - VAULT_WRAPPED_SECRET_ID=${VAULT_WRAPPED_SECRET_ID}
      - VAULT_KV_MOUNT=yieldswarm
      - VAULT_SECRET_PATHS=runtime/backend,runtime/akash,rpc/solana,runtime/odysseus,treasury/mining_roots,iotex
      - VAULT_SKIP_VERIFY=${VAULT_SKIP_VERIFY:-false}
      - VAULT_AGENT_CONFIG=/etc/vault-agent/vault-agent.hcl
      - AGENT_ENV_FILE=/run/secrets/agent.env
    readiness_probe:
      http_get:
        path: /api/health
        port: 8080
      initial_delay_seconds: 15
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 6
    liveness_probe:
      http_get:
        path: /api/helix/health
        port: 8080
      initial_delay_seconds: 30
      period_seconds: 20
      timeout_seconds: 5
      failure_threshold: 5
    params:
      storage:
        secrets:
          mount: /run/secrets
          readOnly: false

profiles:
  compute:
    backend:
      resources:
        cpu:
          units: 4
        memory:
          size: 8Gi
        storage:
          - size: 20Gi
          - name: secrets
            size: 16Mi
            attributes:
              persistent: false
              class: ram

  placement:
    akash:
      attributes:
        host: akash
      pricing:
        backend:
          denom: uakt
          amount: 1500   # ~$1.50–2.50/day depending on provider

deployment:
  backend:
    akash:
      profile: backend
      count: 1
