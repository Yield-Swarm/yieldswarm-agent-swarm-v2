# YieldSwarm monitoring stack — Prometheus + Grafana + Alertmanager.
# Started by deploy/scripts/start-monitoring.sh (STEP 5).
name: yieldswarm-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: yieldswarm-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./targets.json:/etc/prometheus/targets.json:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: yieldswarm-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: yieldswarm-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-yieldswarm}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
