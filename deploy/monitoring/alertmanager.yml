route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: default
    # Wire a real webhook here (Telegram bridge, Slack, PagerDuty). The
    # ERROR_WEBHOOK from the app .env can be plugged in by start-monitoring.sh.
    webhook_configs:
      - url: "http://host.docker.internal:9099/alert"
        send_resolved: true
