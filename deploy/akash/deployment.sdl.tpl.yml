version: "2.0"

services:
  akash-optimizer:
    image: ${AKASH_IMAGE}
    env:
      - APP_ENV=${APP_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - NETWORK_LOCKDOWN_MODE=${NETWORK_LOCKDOWN_MODE}
      - BOOTSTRAP_ENV_FILE=/run/secrets/.env
      - RENDERED_ENV_FILE=/run/secrets/runtime.env
      - VAULT_SECRET_WAIT_SECONDS=${VAULT_SECRET_WAIT_SECONDS}
      - VAULT_SECRET_WAIT_INTERVAL=${VAULT_SECRET_WAIT_INTERVAL}
      - VAULT_KV_MOUNT=${VAULT_KV_MOUNT}
      - VAULT_SECRET_PATHS=${VAULT_SECRET_PATHS}
      - PYTHONUNBUFFERED=1
    params:
      storage:
        secrets:
          mount: /run/secrets
          readOnly: false

profiles:
  compute:
    akash-optimizer:
      resources:
        cpu:
          units: ${AKASH_CPU_UNITS}
        memory:
          size: ${AKASH_MEMORY_SIZE}
        storage:
          - name: secrets
            size: ${AKASH_SECRET_STORAGE_SIZE}
  placement:
    any:
      pricing:
        akash-optimizer:
          denom: uakt
          amount: ${AKASH_PRICE_AMOUNT}

deployment:
  akash-optimizer:
    any:
      profile: akash-optimizer
      count: 1
