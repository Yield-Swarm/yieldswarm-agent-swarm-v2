server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html status.html;

    # Liveness for Docker/Akash/Terraform health checks.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config (worker URLs) must never be cached.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(html|json)$ {
        add_header Cache-Control "no-cache";
    }
}
