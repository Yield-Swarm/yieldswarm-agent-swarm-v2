services:
  odysseus:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ODYSSEUS_IMAGE:-ghcr.io/yieldswarm/agent-swarm-odysseus:local}
    ports:
      - "${ODYSSEUS_PORT:-7000}:7000"
    environment:
      AGENT_SHARD_ID: ${AGENT_SHARD_ID:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ODYSSEUS_AGENT_COUNT: ${ODYSSEUS_AGENT_COUNT:-84}
      ODYSSEUS_GPU_COUNT: ${ODYSSEUS_GPU_COUNT:-1}
      ODYSSEUS_RUNTIME_VAULT_PATH: ${ODYSSEUS_RUNTIME_VAULT_PATH:-yieldswarm/data/odysseus/runtime}
      ODYSSEUS_SERVICE_NAME: odysseus
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-token}
      VAULT_APPROLE_AUTH_PATH: ${VAULT_APPROLE_AUTH_PATH:-auth/approle/login}
      VAULT_JWT_AUTH_PATH: ${VAULT_JWT_AUTH_PATH:-auth/jwt/login}
      VAULT_JWT_ROLE: ${VAULT_JWT_ROLE:-}
      VAULT_KV_PATH: ${VAULT_KV_PATH:-yieldswarm/data/odysseus/runtime}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_TOKEN_FILE: /run/secrets/vault_token
      LLM_HOST: llm-router:4000
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      SEARXNG_INSTANCE: http://searxng:8080
      OLLAMA_BASE_URL: http://llm-router:4000/v1
      AKASH_OLLAMA_BASE_URL: ${AKASH_OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      llm-router:
        condition: service_started
      chromadb:
        condition: service_started
    secrets:
      - vault_token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  llm-router:
    build:
      context: .
      dockerfile: docker/litellm-router/Dockerfile
    image: ${YIELDSWARM_LITELLM_IMAGE:-ghcr.io/yieldswarm/litellm-router:local}
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${YIELDSWARM_ROUTER_API_KEY:-sk-yieldswarm-local}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      OPENROUTER_LITELLM_MODEL: openrouter/${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_MODEL: ${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-70b-instruct}
      FIREWORKS_LITELLM_MODEL: fireworks_ai/${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-70b-instruct}
      AKASH_OLLAMA_BASE_URL: ${AKASH_OLLAMA_BASE_URL:-http://ollama:11434}
      AKASH_OLLAMA_MODEL: ${AKASH_OLLAMA_MODEL:-llama3.1:8b}
      AKASH_OLLAMA_LITELLM_MODEL: ollama/${AKASH_OLLAMA_MODEL:-llama3.1:8b}
      AKASH_OLLAMA_EMBED_MODEL: ${AKASH_OLLAMA_EMBED_MODEL:-nomic-embed-text}
      AKASH_OLLAMA_EMBED_LITELLM_MODEL: ollama/${AKASH_OLLAMA_EMBED_MODEL:-nomic-embed-text}
      LOCAL_OLLAMA_BASE_URL: http://ollama:11434
      LOCAL_OLLAMA_MODEL: ${LOCAL_OLLAMA_MODEL:-llama3.1:8b}
      LOCAL_OLLAMA_LITELLM_MODEL: ollama/${LOCAL_OLLAMA_MODEL:-llama3.1:8b}
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMADB_PORT:-8000}:8000"
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chromadb-data:/chroma/chroma
    restart: unless-stopped

  searxng:
    image: searxng/searxng:2026.5.31-7159b8aed
    ports:
      - "${SEARXNG_PORT:-8081}:8080"
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
    volumes:
      - searxng-data:/etc/searxng
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy
    command: serve
    ports:
      - "${NTFY_PORT:-8091}:80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    profiles:
      - gpu

  model-router-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.model-router
    image: ${MODEL_ROUTER_IMAGE:-ghcr.io/yieldswarm/model-router-api:local}
    ports:
      - "${MODEL_ROUTER_PORT:-8090}:8090"
    environment:
      AKASH_OLLAMA_BASE_URL: ${AKASH_OLLAMA_BASE_URL:-http://ollama:11434}
      LITELLM_URL: http://llm-router:4000
      LITELLM_MASTER_KEY: ${YIELDSWARM_ROUTER_API_KEY:-sk-yieldswarm-local}
    depends_on:
      - llm-router
    restart: unless-stopped
    profiles:
      - routing

  kairo-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.kairo
    image: ${KAIRO_API_IMAGE:-ghcr.io/yieldswarm/kairo-api:local}
    ports:
      - "${KAIRO_API_PORT:-8092}:8092"
    environment:
      KAIRO_IDENTITY_STORE: /data/kairo/identities.json
      KAIRO_IDENTITY_MASTER_SEED: ${KAIRO_IDENTITY_MASTER_SEED:-}
    volumes:
      - kairo-data:/data/kairo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3

secrets:
  vault_token:
    file: ${VAULT_TOKEN_FILE:-./.vault-token}

volumes:
  chromadb-data:
  searxng-data:
  ntfy-cache:
  ollama-models:
  kairo-data:
