services:
  odysseus:
    build:
      context: ${ODYSSEUS_BUILD_CONTEXT:-https://github.com/pewdiepie-archdaemon/odysseus.git#main}
      args:
        INSTALL_OPTIONAL: ${ODYSSEUS_INSTALL_OPTIONAL:-false}
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-7000}:7000"
    volumes:
      - odysseus-data:/app/data
      - odysseus-logs:/app/logs
      - odysseus-ssh:/app/.ssh
      - odysseus-huggingface:/app/.cache/huggingface
      - odysseus-local:/app/.local
      - ./config/yieldswarm:/app/data/imports/yieldswarm:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LLM_HOST: llm-router:4000
      LLM_HOSTS: "llm-router:4000,${AKASH_OLLAMA_HOSTS:-}"
      OPENAI_API_KEY: ${YIELDSWARM_ROUTER_API_KEY:-yieldswarm-dev-router-key}
      OLLAMA_BASE_URL: ${ODYSSEUS_OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      RESEARCH_LLM_ENDPOINT: http://llm-router:4000/v1/chat/completions
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      SEARXNG_INSTANCE: http://searxng:8080
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/app.db}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      LOCALHOST_BYPASS: ${LOCALHOST_BYPASS:-false}
      ODYSSEUS_ADMIN_USER: ${ODYSSEUS_ADMIN_USER:-admin}
      ODYSSEUS_ADMIN_PASSWORD: ${ODYSSEUS_ADMIN_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:7000,http://127.0.0.1:7000}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      EMBEDDING_URL: http://llm-router:4000/v1/embeddings
      EMBEDDING_MODEL: ${YIELDSWARM_EMBEDDING_MODEL:-akash-ollama-embed}
      EMBEDDING_API_KEY: ${YIELDSWARM_ROUTER_API_KEY:-yieldswarm-dev-router-key}
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      CLEANUP_INTERVAL_HOURS: ${CLEANUP_INTERVAL_HOURS:-24}
      ODYSSEUS_INPROCESS_POLLERS: ${ODYSSEUS_INPROCESS_POLLERS:-1}
      ODYSSEUS_INPROCESS_TASKS: ${ODYSSEUS_INPROCESS_TASKS:-1}
      ODYSSEUS_SCRIPT_HOST: ${ODYSSEUS_SCRIPT_HOST:-localhost}
      ODYSSEUS_CHAT_UPLOAD_MAX_BYTES: ${ODYSSEUS_CHAT_UPLOAD_MAX_BYTES:-52428800}
      YIELDSWARM_AGENT_COUNT_TOTAL: ${AGENT_COUNT_TOTAL:-10080}
      YIELDSWARM_DEITY_COUNT: ${YIELDSWARM_DEITY_COUNT:-169}
      YIELDSWARM_DEFAULT_INTERFACE: odysseus
      ODYSSEUS_RUNTIME_VAULT_PATH: ${ODYSSEUS_RUNTIME_VAULT_PATH:-kv/data/yieldswarm/odysseus/runtime}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-token}
      VAULT_KV_PATH: ${VAULT_KV_PATH:-kv/data/yieldswarm/odysseus/runtime}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    secrets:
      - vault_token
    depends_on:
      llm-router:
        condition: service_started
      searxng:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped

  llm-router:
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    ports:
      - "${LLM_ROUTER_BIND:-127.0.0.1}:${LLM_ROUTER_PORT:-4000}:4000"
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${YIELDSWARM_ROUTER_API_KEY:-yieldswarm-dev-router-key}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      OPENROUTER_LITELLM_MODEL: openrouter/${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_MODEL: ${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-70b-instruct}
      FIREWORKS_LITELLM_MODEL: fireworks_ai/${FIREWORKS_MODEL:-accounts/fireworks/models/llama-v3p1-70b-instruct}
      AKASH_OLLAMA_BASE_URL: ${AKASH_OLLAMA_BASE_URL:-http://ollama:11434}
      AKASH_OLLAMA_MODEL: ${AKASH_OLLAMA_MODEL:-llama3.1:8b}
      AKASH_OLLAMA_LITELLM_MODEL: ollama/${AKASH_OLLAMA_MODEL:-llama3.1:8b}
      AKASH_OLLAMA_EMBED_MODEL: ${AKASH_OLLAMA_EMBED_MODEL:-nomic-embed-text}
      AKASH_OLLAMA_EMBED_LITELLM_MODEL: ollama/${AKASH_OLLAMA_EMBED_MODEL:-nomic-embed-text}
      LOCAL_OLLAMA_BASE_URL: ${LOCAL_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LOCAL_OLLAMA_MODEL: ${LOCAL_OLLAMA_MODEL:-llama3.1:8b}
      LOCAL_OLLAMA_LITELLM_MODEL: ollama/${LOCAL_OLLAMA_MODEL:-llama3.1:8b}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=5).read(1)\""]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  chromadb:
    image: docker.io/chromadb/chroma:latest
    ports:
      - "${CHROMADB_BIND:-127.0.0.1}:8100:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:2026.5.31-7159b8aed
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        if [ ! -s /etc/searxng/settings.yml ] || grep -q 'odysseus-local-searxng-json-2026-05-30\|__SEARXNG_SECRET__' /etc/searxng/settings.yml; then
          secret="$${SEARXNG_SECRET:-}"
          if [ -z "$$secret" ]; then
            secret="$$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          fi
          sed "s|__SEARXNG_SECRET__|$$secret|g" /tmp/searxng-settings.yml.template > /etc/searxng/settings.yml
        fi
        exec /usr/local/searxng/entrypoint.sh
    ports:
      - "${SEARXNG_BIND:-127.0.0.1}:8080:8080"
    volumes:
      - searxng-data:/etc/searxng
      - ./config/searxng/settings.yml:/tmp/searxng-settings.yml.template:ro
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5).read(1)\""]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  ntfy:
    image: docker.io/binwiederhier/ntfy
    command: serve
    ports:
      - "${NTFY_BIND:-127.0.0.1}:8091:80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL:-http://localhost:8091}
    restart: unless-stopped

  ollama:
    image: docker.io/ollama/ollama:latest
    profiles:
      - local-ollama
    ports:
      - "${OLLAMA_BIND:-127.0.0.1}:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

secrets:
  vault_token:
    file: ${VAULT_TOKEN_FILE:-./.vault-token}

volumes:
  odysseus-data:
  odysseus-logs:
  odysseus-ssh:
  odysseus-huggingface:
  odysseus-local:
  chromadb-data:
  searxng-data:
  ntfy-cache:
  ollama-data:
