services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMADB_PORT:-8100}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

  llm-router:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_LITELLM_MODEL=${OPENROUTER_LITELLM_MODEL:-openrouter/anthropic/claude-3.5-sonnet}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - FIREWORKS_LITELLM_MODEL=${FIREWORKS_LITELLM_MODEL:-fireworks_ai/accounts/fireworks/models/llama-v3p1-70b-instruct}
      - AKASH_OLLAMA_BASE_URL=${AKASH_OLLAMA_BASE_URL:-http://ollama:11434}
      - AKASH_OLLAMA_LITELLM_MODEL=${AKASH_OLLAMA_LITELLM_MODEL:-ollama/llama3.1:8b}
      - AKASH_OLLAMA_EMBED_LITELLM_MODEL=${AKASH_OLLAMA_EMBED_LITELLM_MODEL:-ollama/nomic-embed-text}
      - LOCAL_OLLAMA_BASE_URL=${LOCAL_OLLAMA_BASE_URL:-http://ollama:11434}
      - LOCAL_OLLAMA_LITELLM_MODEL=${LOCAL_OLLAMA_LITELLM_MODEL:-ollama/llama3.1:8b}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-yieldswarm-dev-router-key}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      - chromadb
    restart: unless-stopped

  odysseus:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ODYSSEUS_IMAGE:-ghcr.io/yieldswarm/agent-swarm-odysseus:local}
    ports:
      - "${ODYSSEUS_PORT:-8080}:8080"
    environment:
      AGENT_SHARD_ID: ${AGENT_SHARD_ID:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ODYSSEUS_AGENT_COUNT: ${ODYSSEUS_AGENT_COUNT:-84}
      ODYSSEUS_GPU_COUNT: ${ODYSSEUS_GPU_COUNT:-1}
      ODYSSEUS_RUNTIME_VAULT_PATH: ${ODYSSEUS_RUNTIME_VAULT_PATH:-kv/data/yieldswarm/odysseus/runtime}
      ODYSSEUS_SERVICE_NAME: odysseus
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_APPROLE_AUTH_PATH: ${VAULT_APPROLE_AUTH_PATH:-auth/approle/login}
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-token}
      VAULT_JWT_AUTH_PATH: ${VAULT_JWT_AUTH_PATH:-auth/jwt/login}
      VAULT_JWT_ROLE: ${VAULT_JWT_ROLE:-}
      VAULT_KV_PATH: ${VAULT_KV_PATH:-kv/data/yieldswarm/odysseus/runtime}
      VAULT_NAMESPACE: ${VAULT_NAMESPACE:-}
      VAULT_TOKEN_FILE: /run/secrets/vault_token
      CHROMADB_URL: http://chromadb:8000
      LITELLM_BASE_URL: http://llm-router:4000/v1
      YIELDSWARM_ROUTER_API_KEY: ${LITELLM_MASTER_KEY:-yieldswarm-dev-router-key}
    depends_on:
      - chromadb
      - llm-router
    secrets:
      - vault_token
    restart: unless-stopped

secrets:
  vault_token:
    file: ${VAULT_TOKEN_FILE:-./.vault-token}

volumes:
  chroma-data:
