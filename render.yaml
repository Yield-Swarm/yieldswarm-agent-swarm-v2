# Render Blueprint — YieldSwarm Integration Backend
# https://render.com/docs/blueprint-spec
#
# Deploy: connect repo in Render dashboard or `render blueprint apply render.yaml`
# Secrets: set in Render dashboard (never commit values). Mirror names from docs/ENV_VARS.md

services:
  # Singapore free-tier DePIN geomining telemetry (srv-d8sfuireo5us73efn3gg)
  - type: web
    name: yieldswarm-agent-swarm-v2-mainnet
    runtime: docker
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./deploy/render/singapore/Dockerfile
    dockerContext: ./deploy/render/singapore
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: MONITOR_EMAIL
        value: ethyswarm@proton.me
      - key: SYNC_BATCH_SIZE
        value: "8"
      - key: SYNC_FLUSH_MS
        value: "1500"

  - type: web
    name: yieldswarm-api
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: HOST
        value: 0.0.0.0
      # Solana / Akash telemetry (set in Render dashboard)
      - key: SOLANA_RPC_URL
        sync: false
      - key: TREASURY_ADDRESS
        sync: false
      - key: EMISSION_ROUTER_ADDRESS
        sync: false
      - key: AKASH_CONSOLE_API_URL
        sync: false
      - key: TELEMETRY_CACHE_TTL_MS
        value: "15000"
      # Optional Vault read (token from Render secret store)
      - key: VAULT_ADDR
        sync: false
      - key: VAULT_TOKEN
        sync: false
