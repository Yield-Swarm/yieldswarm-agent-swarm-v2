<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>YieldSwarm OpenClaw Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --bg:#05060a; --panel:#0d1018; --line:#1f6feb; --ok:#3fb950; --bad:#f85149; --txt:#c9d1d9; --dim:#8b949e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--bg); color:var(--txt); padding:24px; }
    h1 { color:#58a6ff; margin:0 0 4px; }
    .sub { color:var(--dim); margin:0 0 24px; font-size:13px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .card { background:var(--panel); border:1px solid #21262d; border-radius:10px; padding:16px; }
    .card h2 { margin:0 0 10px; font-size:15px; color:#58a6ff; }
    .row { display:flex; justify-content:space-between; gap:8px; padding:3px 0; font-size:13px; }
    .row span:last-child { color:var(--dim); text-align:right; word-break:break-all; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; }
    .pill.ok { background:rgba(63,185,80,.15); color:var(--ok); border:1px solid var(--ok); }
    .pill.bad { background:rgba(248,81,73,.15); color:var(--bad); border:1px solid var(--bad); }
    .pill.wait { background:rgba(139,148,158,.15); color:var(--dim); border:1px solid var(--dim); }
    code { color:#79c0ff; }
    a { color:#58a6ff; }
    .foot { margin-top:24px; color:var(--dim); font-size:12px; }
  </style>
</head>
<body>
  <h1>YieldSwarm OpenClaw Admin</h1>
  <p class="sub">Sovereign swarm control plane &middot; build <code id="build">…</code> &middot; generated <span id="gen">…</span></p>

  <div class="grid" id="workers">
    <div class="card"><h2>Workers</h2><p class="sub">Loading worker config…</p></div>
  </div>

  <div class="foot">
    Worker URLs are injected at deploy time by
    <code>deploy/scripts/update-frontend-urls.sh</code> into <code>/config.js</code>.
    Other panels: <a href="/council/status.html">Council status</a> &middot;
    <a href="/revenue/5tier-marketplace.html">Revenue</a> &middot;
    <a href="/redesign/marketplace-exciting.html">Marketplace</a>
  </div>

  <!-- Runtime config (auto-generated; never cached). -->
  <script src="/config.js"></script>
  <script>
    const cfg = window.YIELDSWARM_CONFIG || { workerUrls: [], buildTag: "unconfigured" };
    document.getElementById("build").textContent = cfg.buildTag || "unconfigured";
    document.getElementById("gen").textContent = cfg.generatedAt || "—";

    const grid = document.getElementById("workers");
    function card(title, inner) {
      const d = document.createElement("div");
      d.className = "card";
      d.innerHTML = `<h2>${title}</h2>${inner}`;
      return d;
    }

    async function probe(url) {
      const t0 = performance.now();
      try {
        const res = await fetch(url.replace(/\/$/, "") + "/healthz", { cache: "no-store" });
        return { ok: res.ok, ms: Math.round(performance.now() - t0) };
      } catch (e) {
        return { ok: false, ms: Math.round(performance.now() - t0) };
      }
    }

    async function render() {
      grid.innerHTML = "";
      const urls = cfg.workerUrls || [];
      if (!urls.length) {
        grid.appendChild(card("Workers", `<p class="sub">No worker URLs configured yet.</p>
          <div class="row"><span>Status</span><span class="pill wait">awaiting deploy</span></div>`));
        return;
      }
      for (const url of urls) {
        const c = card(url.replace(/^https?:\/\//, ""), `
          <div class="row"><span>Status</span><span class="pill wait" data-status>checking…</span></div>
          <div class="row"><span>Latency</span><span data-latency>—</span></div>
          <div class="row"><span>Endpoint</span><span>${url}</span></div>`);
        grid.appendChild(c);
        probe(url).then(r => {
          const s = c.querySelector("[data-status]");
          s.className = "pill " + (r.ok ? "ok" : "bad");
          s.textContent = r.ok ? "LIVE" : "DOWN";
          c.querySelector("[data-latency]").textContent = r.ms + " ms";
        });
      }
    }
    render();
    setInterval(render, 15000);
  </script>
</body>
</html>
