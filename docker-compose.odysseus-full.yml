# YieldSwarm + Odysseus full production stack
# ChromaDB memory, LiteLLM router (OpenRouter/Fireworks/Akash Ollama), SearXNG, Odysseus orchestrator

services:
  chromadb:
    image: chromadb/chroma:0.5.5
    ports:
      - "${CHROMADB_HOST_PORT:-8100}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "${SEARXNG_HOST_PORT:-8088}:8080"
    restart: unless-stopped

  llm-router:
    image: ghcr.io/berriai/litellm:main-stable
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "${LITELLM_HOST_PORT:-4000}:4000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_LITELLM_MODEL: ${OPENROUTER_LITELLM_MODEL:-openrouter/meta-llama/llama-3.1-8b-instruct:free}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      FIREWORKS_LITELLM_MODEL: ${FIREWORKS_LITELLM_MODEL:-fireworks_ai/accounts/fireworks/models/llama-v3p1-8b-instruct}
      AKASH_OLLAMA_BASE_URL: ${AKASH_OLLAMA_BASE_URL:-http://ollama:11434}
      AKASH_OLLAMA_LITELLM_MODEL: ${AKASH_OLLAMA_LITELLM_MODEL:-ollama/llama3.1:8b}
      AKASH_OLLAMA_EMBED_LITELLM_MODEL: ${AKASH_OLLAMA_EMBED_LITELLM_MODEL:-ollama/nomic-embed-text}
      LOCAL_OLLAMA_BASE_URL: ${LOCAL_OLLAMA_BASE_URL:-http://ollama:11434}
      LOCAL_OLLAMA_LITELLM_MODEL: ${LOCAL_OLLAMA_LITELLM_MODEL:-ollama/llama3.2:3b}
      LITELLM_MASTER_KEY: ${YIELDSWARM_ROUTER_API_KEY:-yieldswarm-dev-router-key}
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-gpu"]
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  odysseus:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ODYSSEUS_IMAGE:-ghcr.io/yieldswarm/agent-swarm-odysseus:local}
    ports:
      - "${ODYSSEUS_PORT:-7000}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AGENT_SHARD_ID: ${AGENT_SHARD_ID:-0}
      ODYSSEUS_AGENT_COUNT: ${ODYSSEUS_AGENT_COUNT:-84}
      ODYSSEUS_GPU_COUNT: ${ODYSSEUS_GPU_COUNT:-1}
      ODYSSEUS_SERVICE_NAME: odysseus
      ODYSSEUS_API_KEY: ${ODYSSEUS_API_KEY:-}
      ODYSSEUS_MODEL_HOST: ${ODYSSEUS_MODEL_HOST:-http://llm-router:4000}
      ODYSSEUS_MODEL_API_KEY: ${YIELDSWARM_ROUTER_API_KEY:-yieldswarm-dev-router-key}
      CHROMADB_URL: http://chromadb:8000
      LITELLM_URL: http://llm-router:4000
      YIELDSWARM_ROUTER_API_KEY: ${YIELDSWARM_ROUTER_API_KEY:-yieldswarm-dev-router-key}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY:-}
      AKASH_OLLAMA_BASE_URL: ${AKASH_OLLAMA_BASE_URL:-}
      LOCAL_OLLAMA_BASE_URL: ${LOCAL_OLLAMA_BASE_URL:-http://ollama:11434}
      ODYSSEUS_RUNTIME_VAULT_PATH: ${ODYSSEUS_RUNTIME_VAULT_PATH:-}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_KV_PATH: ${VAULT_KV_PATH:-}
    depends_on:
      chromadb:
        condition: service_healthy
      llm-router:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  chroma-data:
  ollama-models:
